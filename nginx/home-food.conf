# home-food.local  →  dashboard on localhost:8000
#
# Installed by: make install-nginx
# Config lives in the repo; a symlink is created in $(brew --prefix)/etc/nginx/servers/
#
# To reload after editing:  sudo nginx -s reload

server {
    listen      80;
    server_name home-food.local;

    # Proxy everything to the FastAPI dashboard
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Preserve the original host so FastAPI sees it correctly
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Generous timeout for slow thumbnail proxying
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Disable buffering so HTMX partial responses stream immediately
        proxy_buffering    off;
    }
}

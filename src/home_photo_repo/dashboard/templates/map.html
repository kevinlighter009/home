{% extends "base.html" %}
{% block title %}Map — home_photo_repo{% endblock %}
{% block content %}
<div class="card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px;">
  <h2 style="margin: 0;">Map ({{ count }} food photos with GPS)</h2>
  {% if users|length > 1 %}
  <form method="get" action="/" style="margin: 0;">
    <select name="user_id" onchange="this.form.submit()">
      <option value="" {% if not user_filter %}selected{% endif %}>All users</option>
      {% for u in users %}
        <option value="{{ u.user_id }}" {% if user_filter == u.user_id %}selected{% endif %}>
          {{ u.display_name or u.username }}
        </option>
      {% endfor %}
    </select>
    {% if user_filter %}
      <a href="/" style="font-size: 13px; color: var(--muted); margin-left: 6px;">✕ clear</a>
    {% endif %}
  </form>
  {% endif %}
</div>
<div id="map"></div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const markers = {{ markers_json|safe }};
    const map = L.map("map");
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; OpenStreetMap',
      maxZoom: 19,
    }).addTo(map);

    if (markers.length === 0) {
      map.setView([37.7749, -122.4194], 12);
      return;
    }

    const bounds = L.latLngBounds(markers.map(m => [m.lat, m.lng]));
    map.fitBounds(bounds, {padding: [30, 30]});

    markers.forEach(m => {
      const marker = L.marker([m.lat, m.lng]).addTo(map);
      const popup = document.createElement("div");
      const strong = document.createElement("strong");
      strong.textContent = m.dish;
      popup.appendChild(strong);
      if (m.cuisine) {
        popup.appendChild(document.createTextNode(" (" + m.cuisine + ")"));
      }
      popup.appendChild(document.createElement("br"));
      if (m.place_name) {
        popup.appendChild(document.createTextNode("at "));
        const a = document.createElement("a");
        a.href = "/place/" + encodeURIComponent(m.id);
        a.textContent = m.place_name;
        popup.appendChild(a);
      } else {
        popup.appendChild(document.createTextNode("(" + (m.venue_type || "unknown venue") + ")"));
      }
      popup.appendChild(document.createElement("br"));
      const img = document.createElement("img");
      img.src = "/proxy/thumbnail/" + encodeURIComponent(m.id);
      img.style.width = "160px";
      img.style.marginTop = "6px";
      img.loading = "lazy";
      popup.appendChild(img);
      marker.bindPopup(popup);
    });
  });
</script>
{% endblock %}
